<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - ZanEwaste Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 2rem;
            background: var(--card);
            border-radius: 50px;
            box-shadow: var(--shadow);
            text-align: center;
        }
        .login-container h2 { color: var(--primary); margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group input {
            width: 100%;
            padding: 1rem;
            border: 2px solid var(--border);
            border-radius: 40px;
            font-size: 1rem;
        }
        .role-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .role-card {
            padding: 1rem;
            border: 2px solid var(--border);
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
        }
        .role-card.selected {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        .role-card i { font-size: 2rem; margin-bottom: 0.5rem; }
        .btn-login {
            width: 100%;
            padding: 1rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1.1rem;
            cursor: pointer;
        }
        .demo-creds {
            margin-top: 2rem;
            padding: 1rem;
            background: var(--bg);
            border-radius: 30px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2><i class="fas fa-user-lock"></i> Admin Login</h2>
        
        <form id="loginForm">
            <div class="form-group">
                <input type="email" id="email" placeholder="Barua pepe" required>
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="Nywila" required>
            </div>
            
            <div class="role-selector">
                <div class="role-card selected" onclick="selectRole('admin')">
                    <i class="fas fa-crown"></i>
                    <h4>Admin</h4>
                </div>
                <div class="role-card" onclick="selectRole('agent')">
                    <i class="fas fa-user-tie"></i>
                    <h4>Agent</h4>
                </div>
            </div>
            
            <button type="submit" class="btn-login">Ingia</button>
            
            <p style="margin:1rem 0"><a href="register.html">Huna akaunti? Jisajili</a></p>
            
            <div class="demo-creds">
                <strong>Demo:</strong><br>
                Admin: admin@zanewaste.com / admin123<br>
                Agent: agent@zanewaste.com / agent123
            </div>
        </form>
    </div>

    <script>
        function selectRole(role) {
            document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
            document.querySelector(`[onclick*="${role}"]`).classList.add('selected');
        }
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.querySelector('.role-card.selected h4').textContent.toLowerCase();
            
            if (email === 'admin@zanewaste.com' && password === 'admin123' && role === 'admin') {
                localStorage.setItem('userRole', 'admin');
                window.location.href = 'index.html';
            } else if (email === 'agent@zanewaste.com' && password === 'agent123' && role === 'agent') {
                localStorage.setItem('userRole', 'agent');
                window.location.href = '../agent/dashboard.html';
            } else {
                alert('Invalid credentials');
            }
        });
    </script>
</body>
</html>
