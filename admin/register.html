<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Register - ZanEwaste Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .register-container {
            max-width: 500px;
            margin: 50px auto;
            padding: 2rem;
            background: var(--card);
            border-radius: 50px;
            box-shadow: var(--shadow);
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .form-group { margin-bottom: 1rem; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid var(--border);
            border-radius: 40px;
        }
        .role-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .role-option {
            text-align: center;
            padding: 1rem;
            border: 2px solid var(--border);
            border-radius: 30px;
            cursor: pointer;
        }
        .role-option.selected {
            background: var(--accent);
            color: white;
        }
        .btn-register {
            width: 100%;
            padding: 1rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1.1rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h2 style="text-align:center; color:var(--primary); margin-bottom:2rem;">Jisajili</h2>
        
        <form id="registerForm">
            <div class="form-grid">
                <div class="form-group"><input type="text" placeholder="Jina la kwanza" required></div>
                <div class="form-group"><input type="text" placeholder="Jina la mwisho" required></div>
                <div class="form-group"><input type="email" placeholder="Barua pepe" required></div>
                <div class="form-group"><input type="tel" placeholder="Simu" required></div>
                <div class="form-group"><input type="password" placeholder="Nywila" required></div>
                <div class="form-group"><input type="password" placeholder="Thibitisha nywila" required></div>
            </div>
            
            <div class="role-options">
                <div class="role-option selected" onclick="selectRole('admin')">
                    <i class="fas fa-crown"></i> <span>Admin</span>
                </div>
                <div class="role-option" onclick="selectRole('agent')">
                    <i class="fas fa-user-tie"></i> <span>Agent</span>
                </div>
                <div class="role-option" onclick="selectRole('viewer')">
                    <i class="fas fa-eye"></i> <span>Viewer</span>
                </div>
            </div>
            
            <button type="submit" class="btn-register">Jisajili</button>
            <p style="text-align:center; margin-top:1rem;"><a href="login.html">Ingia hapa</a></p>
        </form>
    </div>
    <script>
        function selectRole(role) {
            document.querySelectorAll('.role-option').forEach(r => r.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
        }
    </script>
</body>
</html>
