<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <title>Technician Registration - ZanEwaste</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
        body {
            background: linear-gradient(135deg, #0b3b2f, #1e6f5c);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .register-container {
            background: rgba(255,255,255,0.95);
            border-radius: 50px;
            padding: 3rem;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            animation: slideIn 0.8s ease;
        }
        @keyframes slideIn {
            from { opacity:0; transform:translateY(-50px); }
            to { opacity:1; transform:translateY(0); }
        }
        h2 { text-align:center; color:#0b3b2f; margin-bottom:2rem; font-size:2.2rem; }
        h2 i { color:#e67e22; }
        .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; }
        .full-width { grid-column:span 2; }
        .form-group { margin-bottom:1rem; }
        label { display:block; margin-bottom:0.3rem; color:#0b3b2f; font-weight:500; }
        input, select, textarea {
            width:100%; padding:0.8rem 1rem; border:2px solid #d5e6df; border-radius:40px;
            font-size:1rem; transition:0.3s;
        }
        input:focus, select:focus, textarea:focus {
            border-color:#e67e22; outline:none; box-shadow:0 0 0 3px rgba(230,126,34,0.2);
        }
        textarea { border-radius:30px; resize:vertical; }
        .file-upload {
            border:2px dashed #e67e22; border-radius:40px; padding:1rem; text-align:center;
            cursor:pointer; position:relative; background:#f9f9f9;
        }
        .file-upload input { position:absolute; top:0; left:0; width:100%; height:100%; opacity:0; cursor:pointer; }
        .file-upload i { font-size:2rem; color:#e67e22; }
        .btn-register {
            background:#e67e22; color:white; border:none; padding:1rem 2rem; border-radius:40px;
            font-size:1.2rem; font-weight:600; cursor:pointer; width:100%; margin-top:2rem;
            transition:0.3s; border:2px solid #e67e22;
        }
        .btn-register:hover { background:transparent; color:#e67e22; transform:translateY(-3px); }
        .login-link { text-align:center; margin-top:1.5rem; }
        .login-link a { color:#e67e22; text-decoration:none; font-weight:500; }
        @media (max-width:600px) { .form-grid { grid-template-columns:1fr; } .full-width { grid-column:span 1; } }
    </style>
</head>
<body>
    <div class="register-container">
        <h2><i class="fas fa-tools"></i> Technician Registration</h2>
        <form id="registerForm">
            <div class="form-grid">
                <div class="form-group">
                    <label>Jina la Kwanza *</label>
                    <input type="text" id="firstName" required>
                </div>
                <div class="form-group">
                    <label>Jina la Mwisho *</label>
                    <input type="text" id="lastName" required>
                </div>
                <div class="form-group">
                    <label>Barua Pepe *</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Namba ya Simu *</label>
                    <input type="tel" id="phone" required>
                </div>
                <div class="form-group">
                    <label>Nywila *</label>
                    <input type="password" id="password" required>
                </div>
                <div class="form-group">
                    <label>Thibitisha Nywila *</label>
                    <input type="password" id="confirmPassword" required>
                </div>
                <div class="form-group full-width">
                    <label>Anuani</label>
                    <input type="text" id="address" placeholder="Mtaa, Wilaya, Mkoa">
                </div>
                <div class="form-group">
                    <label>Eneo la Utaalam *</label>
                    <select id="specialization" required>
                        <option value="">-- Chagua --</option>
                        <option value="Laptop Repair">Laptop Repair</option>
                        <option value="Mobile Phone Repair">Mobile Phone Repair</option>
                        <option value="Printer Repair">Printer Repair</option>
                        <option value="TV/Monitor Repair">TV/Monitor Repair</option>
                        <option value="Battery Recycling">Battery Recycling</option>
                        <option value="General Electronics">General Electronics</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Miaka ya Uzoefu</label>
                    <input type="number" id="experience" min="0" value="0">
                </div>
                <div class="form-group full-width">
                    <label>Maelezo mafupi kuhusu wewe</label>
                    <textarea id="bio" rows="4" placeholder="Elezea ujuzi wako, vyeti, n.k."></textarea>
                </div>
                <div class="form-group full-width">
                    <label>Pakia CV (PDF, DOCX)</label>
                    <div class="file-upload" id="cvUpload">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p>Bonyeza au buruta faili la CV</p>
                        <input type="file" id="cvFile" accept=".pdf,.docx">
                    </div>
                </div>
            </div>
            <button type="submit" class="btn-register">Jisajili</button>
            <div class="login-link">
                <p>Una akaunti tayari? <a href="login.html">Ingia hapa</a></p>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Validate password
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            if(password !== confirm) {
                alert('Nywila hazilingani!');
                return;
            }
            
            const formData = {
                first_name: document.getElementById('firstName').value,
                last_name: document.getElementById('lastName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                password: password,
                address: document.getElementById('address').value,
                specialization: document.getElementById('specialization').value,
                experience_years: parseInt(document.getElementById('experience').value) || 0,
                bio: document.getElementById('bio').value
            };
            
            try {
                const res = await fetch('http://localhost/ewaste-website/api/technician/register.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                const data = await res.json();
                if(data.success) {
                    alert('Usajili umetumwa! Utapokea taarifa baada ya kukaguliwa.');
                    window.location.href = 'login.html';
                } else {
                    alert('Hitilafu: ' + data.message);
                }
            } catch(err) {
                alert('Hitilafu ya mtandao');
            }
        });
    </script>
</body>
</html>
