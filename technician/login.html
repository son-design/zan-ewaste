<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technician Login - ZanEwaste Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }
        body {
            background: linear-gradient(135deg, #0b3b2f, #1e6f5c);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .login-container {
            background: rgba(255,255,255,0.95);
            border-radius: 50px;
            padding: 3rem 2rem;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            animation: slideIn 0.8s ease;
        }
        @keyframes slideIn {
            from { opacity:0; transform:translateY(-30px); }
            to { opacity:1; transform:translateY(0); }
        }
        h2 { text-align:center; color:#0b3b2f; margin-bottom:2rem; font-size:2rem; }
        h2 i { color:#e67e22; margin-right:0.5rem; }
        .form-group { margin-bottom:1.5rem; }
        label { display:block; margin-bottom:0.5rem; color:#0b3b2f; font-weight:500; }
        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-group i {
            position: absolute;
            left: 1.2rem;
            color: #e67e22;
        }
        .input-group input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            border: 2px solid #d5e6df;
            border-radius: 40px;
            font-size: 1rem;
            transition: 0.3s;
        }
        .input-group input:focus {
            border-color: #e67e22;
            outline: none;
            box-shadow: 0 0 0 3px rgba(230,126,34,0.2);
        }
        .btn-login {
            width: 100%;
            padding: 1rem;
            background: #e67e22;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid #e67e22;
        }
        .btn-login:hover {
            background: transparent;
            color: #e67e22;
            transform: translateY(-3px);
        }
        .register-link {
            text-align: center;
            margin-top: 1.5rem;
        }
        .register-link a {
            color: #e67e22;
            text-decoration: none;
            font-weight: 500;
        }
        .demo-info {
            margin-top: 2rem;
            padding: 1rem;
            background: #f0f0f0;
            border-radius: 30px;
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2><i class="fas fa-tools"></i> Technician Login</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>Barua Pepe</label>
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="weka@baruapepe.com" required>
                </div>
            </div>
            <div class="form-group">
                <label>Nywila</label>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" class="btn-login">Ingia</button>
            <div class="register-link">
                <p>Huna akaunti? <a href="register.html">Jisajili hapa</a></p>
            </div>
            <div class="demo-info">
                <p><strong>Demo:</strong> tech@example.com / tech123</p>
                <p><small>Baada ya usajili, subiri kuidhinishwa na admin</small></p>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const res = await fetch('http://localhost/ewaste-website/api/auth/login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                
                if(data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    if(data.user.role === 'technician') {
                        window.location.href = 'dashboard.html';
                    } else {
                        alert('Haujajisajili kama technician');
                    }
                } else {
                    alert('Hitilafu: ' + data.message);
                }
            } catch(err) {
                alert('Hitilafu ya mtandao');
            }
        });
    </script>
</body>
</html>
